<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }
    .header .subtitle {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .scan-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .scan-btn:hover {
      background: rgba(255,255,255,0.35);
    }
    .stats {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      background: #f3f4f6;
    }
    .stat .num {
      font-size: 20px;
      font-weight: 700;
    }
    .stat .label {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }
    .stat.high .num { color: #dc2626; }
    .stat.medium .num { color: #d97706; }
    .stat.low .num { color: #2563eb; }
    .list {
      overflow-y: auto;
      max-height: 340px;
      padding: 8px;
    }
    .job-item {
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #e5e7eb;
      cursor: default;
    }
    .job-item.high-risk { border-left-color: #dc2626; }
    .job-item.medium-risk { border-left-color: #d97706; }
    .job-item.low-risk { border-left-color: #2563eb; }
    .job-item .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .job-item .company {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .job-item .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .flag-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: #fef2f2;
      color: #991b1b;
    }
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 13px;
    }
    .empty .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Ghost Job Detector</h1>
      <div class="subtitle">Sahte ilan tespit sistemi</div>
    </div>
    <button class="scan-btn" id="rescan">Tekrar Tara</button>
  </div>
  <div class="stats">
    <div class="stat high"><div class="num" id="highCount">0</div><div class="label">Yuksek Risk</div></div>
    <div class="stat medium"><div class="num" id="medCount">0</div><div class="label">Orta Risk</div></div>
    <div class="stat low"><div class="num" id="lowCount">0</div><div class="label">Dusuk Risk</div></div>
  </div>
  <div class="list" id="jobList">
    <div class="empty">
      <div class="icon">🔍</div>
      LinkedIn Jobs sayfasini acin ve ilanlari tarayin.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
